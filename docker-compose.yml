services:
  postgres:
    image: postgres:15-alpine
    container_name: varta_postgres
    environment:
      POSTGRES_USER: varta_user
      POSTGRES_PASSWORD: varta_pass
      POSTGRES_DB: varta_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: